<div class="container">

    <form onsubmit="enviarMensaje(event)">
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required><br>
        <input type="email" id="correo" name="email" placeholder="Tu correo" required><br>

<script>

async function enviarMensaje(event) {
    event.preventDefault();

    // 1. Obtenemos el formulario y el nombre para el alert
    const formulario = event.target;
    const nombre = document.getElementById("nombre").value;

    // 2. Enviamos los datos al servicio de correo
    // REEMPLAZA "tu_id_aqui" por el código que te dé Formspree
    const respuesta = await fetch("https://formspree.io/f/mgopbyyw", {
        method: "POST",
        body: new FormData(formulario),
        headers: { 'Accept': 'application/json' }
    });

    // 3. Si el envío fue exitoso, ejecutamos tu lógica original
    if (respuesta.ok) {
        alert("Gracias " + nombre + ", tu mensaje fue enviado 📩");
        formulario.reset();
    } else {
        alert("Ups, hubo un problema al enviar el mensaje.");
    }
}

</script>
