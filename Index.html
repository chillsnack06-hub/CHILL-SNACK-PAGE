<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chill Snack - Inicio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #fff5cc;
}

/* HEADER */
header {
    background-color: #e63946;
    color: white;
    text-align: center;
    padding: 15px;
}

header img {
    width: 130px;
}

/* NAV */
nav {
    background-color: #ffb703;
    text-align: center;
    padding: 10px;
}

nav a {
    color: black;
    text-decoration: none;
    margin: 15px;
    font-weight: bold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px;
    background-color: #ffd166;
}

.hero h1 {
    color: #d62828;
    font-size: 40px;
}

/* PRODUCTOS */
.productos {
    text-align: center;
    padding: 30px;
}

.producto {
    display: inline-block;
    width: 220px;
    margin: 15px;
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

.producto img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.producto h3 {
    color: #d62828;
}

.producto button {
    background-color: #ffb703;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* FOOTER */
footer {
    background-color: #e63946;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <img src="img/logo.png">
    <h1>Chill Snack</h1>
</header>

<nav>
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="contacto2.html">Contacto</a>
    <a href="manual.html">Manual de identidad corporativa</a>
    <a href="carrito.html">Carrito 🛒</a>
</nav>

<section class="hero">
    <h1>¡Snacks irresistibles!</h1>
    <p>Relajate y disfruta el sabor</p>
</section>

<section class="productos">
    <h2>Productos destacados</h2>

    <div class="producto">
        <img src="img/tostilocos.png">
        <h3>Tostilocos</h3>
        <p>$70</p>
        <button onclick="agregar('Tostilocos',70,'Antojos')">Agregar</button>
    </div>

    <div class="producto">
        <img src="img/merary.jpg">
        <h3>Vaquita loca</h3>
        <p>$65</p>
        <button onclick="agregar('Dorilocos',80,'Antojos')">Agregar</button>
    </div>

    <div class="producto">
        <img src="img/fresas.jpg">
        <h3>Fresas con crema</h3>
        <p>$65</p>
        <button onclick="agregar('Fresas con crema',65,'Fresas')">Agregar</button>
    </div>

    <div class="producto">
        <img src="img/frappe.jpg">
        <h3>Frappe Oreo</h3>
        <p>$65</p>
        <button onclick="agregar('Oreo',65,'Frappe')">Agregar</button>
    </div>

    <div class="producto">
        <img src="img/maruchan.jpg">
        <h3>Maruchan Elote</h3>
        <p>$110</p>
        <button onclick="agregar('Maruchan Elote',110,'Sabritas')">Agregar</button>
    </div>

</section>

<footer>
    <p>© 2026 Chill Snack</p>
</footer>

<script>
function agregar(producto, precio, seccion) {

    let detalleTopping = "No";

    // SOLO PARA FRESAS
    if (seccion === "Fresas") {

        let topping = confirm("¿Quieres agregar topping extra? (+$15)");

        if (topping) {
            let opcion = prompt("Escribe el topping:");

            if (opcion) {
                detalleTopping = "Sí (" + opcion + ")";
            } else {
                detalleTopping = "Sí";
            }

            precio += 15;
        }
    }

    let item = seccion + " - " + producto + " ($" + precio + ") | Topping: " + detalleTopping;

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    carrito.push(item);

    localStorage.setItem("carrito", JSON.stringify(carrito));

    alert("Agregado 🛒\n" + item);
}
</script>

</body>
</html>
